<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Хатинка Лапок</title>

    <link
      rel="preload"
      as="image"
      href="/img/hero/hero-tel.webp"
      imagesrcset="/img/hero/hero-tel.webp 1x, /img/hero/hero-tel@2x.webp 2x"
      fetchpriority="high"
      media="(max-width: 767.98px)"
      type="image/webp"
    />
    <link
      rel="preload"
      as="image"
      href="/img/hero/hero-tabl.webp"
      imagesrcset="/img/hero/hero-tabl.webp 1x, /img/hero/hero-tabl@2x.webp 2x"
      fetchpriority="high"
      media="(min-width: 768px) and (max-width: 1439.98px)"
      type="image/webp"
    />
    <link
      rel="preload"
      as="image"
      href="/img/hero/hero-desk.webp"
      imagesrcset="/img/hero/hero-desk.webp 1x, /img/hero/hero-desk@2x.webp 2x"
      fetchpriority="high"
      media="(min-width: 1440px)"
      type="image/webp"
    />

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="./css/modern-normalize.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <load src="./partials/header.html" />

    <main>
      <load src="./partials/hero.html" />

      <load src="./partials/faq.html" />
      <load src="./partials/stories.html" />
    </main>

    <load src="./partials/footer.html" />

    <load src="./partials/mobile-menu.html" />
    <load src="./partials/order-modal.html" />
    <load src="./partials/loader.html" />
    <load src="./partials/hover-animation.html" />
    <load src="./partials/scroll-to-top.html" />
    <load src="./partials/pawlist-modal.html" />
    <load src="./partials/cursor.html" />
    <load src="./partials/dev-team-modal.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
