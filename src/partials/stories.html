<section class="stories-section" id="stories">
  <div class="container">

    <div class="stories-header">
      <h2 class="stories-title">Щасливі історії, що надихають</h2>
      <p class="stories-subtitle">Ці хвостики вже знайшли свій дім. Ваш майбутній друг теж чекає на вас</p>
    </div>

    <!-- Loading state -->
    <div class="stories-loading" id="stories-loading">
      <span class="stories-spinner"></span>
    </div>

    <!-- Slider -->
    <div class="stories-slider-wrap" id="stories-slider-wrap">
      <div class="swiper stories-swiper" id="stories-swiper">
        <ul class="swiper-wrapper stories-list" id="stories-swiper-wrapper">
          <!-- Cards rendered by JS -->
        </ul>
      </div>

      <div class="stories-controls">
        <!-- Pagination -->
        <div
          class="stories-pagination"
          id="stories-pagination"
          role="tablist"
          aria-label="Навігація відгуками"
        ></div>

        <!-- Nav buttons -->
        <div class="stories-nav" role="group" aria-label="Кнопки навігації">
          <button
            class="stories-nav-btn stories-nav-btn--prev"
            id="stories-btn-prev"
            type="button"
            aria-label="Попередній відгук"
            disabled
          >
            <svg class="stories-nav-icon" aria-hidden="true">
              <use href="/img/icons.svg#arrow_back"></use>
            </svg>
          </button>
          <button
            class="stories-nav-btn stories-nav-btn--next"
            id="stories-btn-next"
            type="button"
            aria-label="Наступний відгук"
          >
            <svg class="stories-nav-icon" aria-hidden="true">
              <use href="/img/icons.svg#arrow_forward"></use>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</section>
