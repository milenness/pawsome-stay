<!-- PET MODAL - Animal Details Modal -->
<div id="petModal" class="pet-modal-overlay">
  <div class="pet-modal">
    <!-- Закрити кнопка -->
    <button class="pet-modal-close" type="button" aria-label="Закрити модальне вікно">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="pet-modal-content">
      <!-- Ліва частина - фото -->
      <div class="pet-modal-image-wrapper">
        <img id="petModalImage" src="" alt="Фото тварини" class="pet-modal-image">
        <div class="pet-modal-badge">
          <span id="petModalCategory" class="pet-modal-category-badge"></span>
        </div>
      </div>

      <!-- Права частина - інформація -->
      <div class="pet-modal-info">
        <div class="pet-modal-header">
          <h2 id="petModalName" class="pet-modal-name"></h2>
          <div class="pet-modal-meta">
            <span id="petModalAge" class="pet-modal-meta-item"></span>
            <span id="petModalGender" class="pet-modal-meta-item"></span>
          </div>
        </div>

        <div class="pet-modal-sections">
          <!-- Опис -->
          <div class="pet-modal-section">
            <h3 class="pet-modal-section-title">Опис:</h3>
            <p id="petModalDescription" class="pet-modal-section-text"></p>
          </div>

          <!-- Здоров'я -->
          <div class="pet-modal-section">
            <h3 class="pet-modal-section-title">Здоров'я:</h3>
            <p id="petModalHealthStatus" class="pet-modal-section-text"></p>
          </div>

          <!-- Поведінка -->
          <div class="pet-modal-section">
            <h3 class="pet-modal-section-title">Поведінка:</h3>
            <p id="petModalBehavior" class="pet-modal-section-text"></p>
          </div>
        </div>

        <!-- Кнопка дії -->
        <button id="petModalActionBtn" class="btn modal-btn" type="button">Взяти додому</button>
      </div>
    </div>
  </div>
</div>
