<section class="hero-section">
  <picture class="hero-media">
    <source
      media="(min-width: 1440px)"
      srcset="/img/hero/hero-desk.png 1x, /img/hero/hero-desk@2x.png 2x"
    />
    <source
      media="(min-width: 768px)"
      srcset="/img/hero/hero-tabl.png 1x, /img/hero/hero-tabl@2x.png 2x"
    />
    <img
      class="hero-image"
      src="/img/hero/hero-tel.png"
      srcset="/img/hero/hero-tel.png 1x, /img/hero/hero-tel@2x.png 2x"
      alt=""
      loading="eager"
      decoding="async"
      fetchpriority="high"
      aria-hidden="true"
    />
  </picture>

  <div class="container">
    <h1 class="title-hero">
      Кожне життя має значення. Знайди свого вірного друга
    </h1>
    <p class="text-hero">
      Сотні котиків та собачок у притулку Хатинка Лапок чекають на свою родину.
      Подаруйте їм дім.
    </p>
    <a href="#stories" class="btn-hero">Подивитись історії</a>
  </div>
</section>
